---
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/lkmotto/motto-distribution

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package public
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -n "$GHCR_PAT" ]; then
            curl -sf -o /dev/null -w "Visibility PATCH: HTTP %{http_code}\n" -X PATCH \
              -H "Authorization: token $GHCR_PAT" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d '{"visibility":"public"}' \
              "https://api.github.com/user/packages/container/motto-distribution" || true
          fi
        continue-on-error: true

  deploy:
    name: Deploy to Maritime
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Maritime redeploy
        env:
          MARITIME_API_KEY: ${{ secrets.MARITIME_API_KEY }}
          MARITIME_AGENT_ID: ${{ secrets.MARITIME_AGENT_ID }}
        run: |
          if [ -z "$MARITIME_API_KEY" ] || [ -z "$MARITIME_AGENT_ID" ]; then
            echo "Maritime secrets not set — skipping."
            exit 0
          fi
          curl -sf -X POST \
            -H "X-API-Key: $MARITIME_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.maritime.sh/api/v1/agents/$MARITIME_AGENT_ID/deploy" \
            -d "{\"image_name\": \"${{ env.IMAGE }}:latest\"}" \
            && echo "Maritime redeploy triggered." \
            || echo "Maritime deploy failed (non-fatal)."
