# Managed by fleet automation (MOT-27).
# Groups minor/patch updates into one PR per ecosystem per week.
# PRs receive 'auto-merge-ok'; .github/workflows/dependabot-auto-merge.yml
# auto-merges patch-only group PRs after CI passes.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "auto-merge-ok"
    groups:
      production-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "auto-merge-ok"
    groups:
      production-dependencies:
        patterns:
          - "*"
